version: "3.9"

services:
  # Streamlit web application
  web:
    build: .
    ports:
      - "8502:8502"
    env_file: .env
    command:
      - streamlit
      - run
      - streamlit_app.py
      - --server.port=8502
      - --server.address=0.0.0.0
    restart: unless-stopped

  # MCP HTTP server (SSE transport)
  mcp-server:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    command:
      - uvicorn
      - mcp_http_server:app
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
    restart: unless-stopped
